{% extends "base.html" %}
{% block title %}Регистрация · Safari Digital Library{% endblock %}
{% block content_class %}content-wide{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-brand">
      <p class="auth-brand-name">Safari Digital Library</p>
    </div>
    <h1 class="auth-title">Создать аккаунт</h1>
    <p class="auth-sub">Присоединяйтесь к библиотеке знаний</p>

    <form method="POST" action="{{ url_for('main.register') }}" novalidate>
      <div class="field">
        <label for="username">Email</label>
        <input type="email" id="username" name="username"
               placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password"
               placeholder="Минимум 6 символов" autocomplete="new-password" required />
      </div>
      <div class="field">
        <label for="confirm">Подтвердите пароль</label>
        <input type="password" id="confirm" name="confirm"
               placeholder="Повторите пароль" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn-submit btn-full">Зарегистрироваться</button>
    </form>

    <p class="auth-footer">
      Уже есть аккаунт?
      <a href="{{ url_for('main.login') }}" class="btn-link">Войти</a>
    </p>
  </div>
</div>
{% endblock %}
